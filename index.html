<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Your Art</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
  background: #fff7cc;
}

/* CAMERA */
#camera {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 1;
}

/* IMAGE OVERLAY */
#overlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  touch-action: none;
}

/* LOGO */
#appLogo {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  z-index: 20;
  pointer-events: none;
  opacity: 0.9;
}

/* BUTTONS */
#controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
  z-index: 20;
}

button {
  padding: 12px 18px;
  border-radius: 20px;
  border: none;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}

#fileBtn { background: #ffd6e0; }
#lockBtn { background: #d6f0ff; }
#opacityBtn { background: #fff0b3; }

/* START SCREEN */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #fff7cc;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  text-align: center;
}

#startScreen.hidden {
  display: none;
}

h1 {
  font-size: 40px;
  margin: 20px 0;
}

#startBtn {
  padding: 15px 25px;
  border-radius: 25px;
  background: #ffc0cb;
  border: none;
  font-size: 16px;
}

.credit {
  position: absolute;
  bottom: 20px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>Trace<br>Your Art!</h1>
  <button id="startBtn">Tap to Start</button>
  <div class="credit">developed by @mydailydoodles</div>
</div>

<video id="camera" autoplay playsinline></video>
<img id="overlay">
<img src="mydailydoodles-logo.png" id="appLogo">

<div id="controls">
  <button id="fileBtn">Open Image</button>
  <button id="lockBtn">Lock</button>
  <button id="opacityBtn">Opacity</button>
</div>

<input type="file" id="fileInput" accept="image/*" hidden>

<script>
// SOUND
const clickSound = new Audio("click.mp3");
clickSound.volume = 0.4;

function playClick(){
  clickSound.currentTime = 0;
  clickSound.play();
}

// START
const startScreen = document.getElementById("startScreen");

startScreen.addEventListener("click", () => {

  clickSound.play().then(()=>{
    clickSound.pause();
    clickSound.currentTime = 0;
  });

  startScreen.classList.add("hidden");
  initCamera();
});

// CAMERA
async function initCamera(){
  const video = document.getElementById("camera");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { exact: "environment" } }
  }).catch(() => navigator.mediaDevices.getUserMedia({ video: true }));

  video.srcObject = stream;
}

// ELEMENTS
const overlay = document.getElementById("overlay");
const fileBtn = document.getElementById("fileBtn");
const fileInput = document.getElementById("fileInput");
const lockBtn = document.getElementById("lockBtn");
const opacityBtn = document.getElementById("opacityBtn");

// STATE
let locked = false;
let state = { x:0, y:0, scale:1, rotation:0 };

// LOAD IMAGE
fileBtn.addEventListener("click", () => {
  playClick();
  fileInput.click();
});

fileInput.addEventListener("change", e => {
  const file = e.target.files[0];
  if(!file) return;

  overlay.src = URL.createObjectURL(file);

  // reset position
  state = { x:0, y:0, scale:1, rotation:0 };
  updateTransform();

  fileBtn.innerText = "Change Image";
});

// LOCK
lockBtn.addEventListener("click", () => {
  playClick();
  locked = !locked;
});

// OPACITY
let opacity = 1;
opacityBtn.addEventListener("click", () => {
  playClick();
  opacity -= 0.25;
  if(opacity <= 0) opacity = 1;
  overlay.style.opacity = opacity;
});

// DRAG
let startX, startY;

function startDrag(x,y){
  startX = x - state.x;
  startY = y - state.y;
}

function moveDrag(x,y){
  state.x = x - startX;
  state.y = y - startY;
  updateTransform();
}

// PINCH
let startDist=0, startScale=1;

function getDist(t1,t2){
  return Math.hypot(
    t1.clientX - t2.clientX,
    t1.clientY - t2.clientY
  );
}

// TOUCH EVENTS
overlay.addEventListener("touchstart", e => {
  if(locked) return;

  if(e.touches.length === 1){
    startDrag(e.touches[0].clientX, e.touches[0].clientY);
  }

  if(e.touches.length === 2){
    startDist = getDist(e.touches[0], e.touches[1]);
    startScale = state.scale;
  }
});

overlay.addEventListener("touchmove", e => {
  if(locked) return;

  if(e.touches.length === 1){
    moveDrag(e.touches[0].clientX, e.touches[0].clientY);
  }

  if(e.touches.length === 2){
    let newDist = getDist(e.touches[0], e.touches[1]);
    state.scale = startScale * (newDist / startDist);
    updateTransform();
  }
});

// APPLY
function updateTransform(){
  overlay.style.transform =
    `translate(${state.x}px, ${state.y}px) scale(${state.scale}) rotate(${state.rotation}deg)`;
}

</script>

</body>
</html>
