<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Tool</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */

body {
  margin: 0;
  overflow: hidden;
  background: #0f172a;
  font-family: 'Press Start 2P', monospace;
}

/* CAMERA */
#video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY */
#overlay {
  position: absolute;
  width: 300px;
  top: 150px;
  left: 100px;

  opacity: 0.5;
  transform-origin: center;
  touch-action: none;
}

/* =========================
   UI PANEL
========================= */

#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;

  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);

  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 14px;

  padding: 12px;

  color: white;
  font-size: 10px;
}

/* =========================
   BUTTONS (PASTEL RETRO)
========================= */

#buttons {
  position: fixed;
  top: 20px;
  left: 20px;
  display: flex;
  gap: 10px;
}

/* shared button */
button {
  font-family: 'Press Start 2P', monospace;

  border: none;
  border-radius: 12px;

  padding: 10px;
  font-size: 10px;

  cursor: pointer;

  box-shadow: 0 5px 0 rgba(0,0,0,0.4);
  transition: 0.1s;
}

button:active {
  transform: translateY(3px);
  box-shadow: 0 2px 0 rgba(0,0,0,0.4);
}

/* pastel variants */
#lockBtn {
  background: #fbcfe8; /* pink */
  color: #3b0764;
}

#gridBtn {
  background: #fde68a; /* yellow */
  color: #3b2f00;
}

#file {
  background: #bfdbfe; /* blue */
  padding: 6px;
  border-radius: 8px;
}

/* =========================
   GRID
========================= */

#grid {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;

  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);

  background-size: 24px 24px;

  display: none;
}

/* =========================
   CREDIT
========================= */

#credit {
  position: fixed;
  bottom: 10px;
  right: 12px;

  font-size: 8px;
  color: rgba(255,255,255,0.6);
}

</style>
</head>

<body>

<div id="grid"></div>

<!-- CAMERA -->
<video id="video" autoplay playsinline></video>

<!-- OVERLAY -->
<img id="overlay" src="" />

<!-- BUTTONS -->
<div id="buttons">
  <button id="lockBtn">Lock</button>
  <button id="gridBtn">Grid</button>
  <input type="file" id="file">
</div>

<!-- CONTROLS -->
<div id="controls">
  Opacity<br><br>
  <input type="range" min="0" max="1" step="0.1" id="opacity">
</div>

<!-- CREDIT -->
<div id="credit">developed by @mydailydoodles</div>

<script>

// =========================
// CAMERA (back camera)
// =========================
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream => {
  document.getElementById("video").srcObject = stream;
});

// =========================
// IMAGE
// =========================
const file = document.getElementById("file");
const overlay = document.getElementById("overlay");

function resetOverlay() {
  state.scale = 1;
  state.rotation = 0;
  state.offsetX = 100;
  state.offsetY = 150;
  updateTransform();
}

file.addEventListener("change", e => {
  const img = e.target.files[0];
  overlay.src = URL.createObjectURL(img);
  resetOverlay();
});

// opacity
document.getElementById("opacity").addEventListener("input", e => {
  overlay.style.opacity = e.target.value;
});

// =========================
// STATE
// =========================
let state = {
  dragging: false,
  scale: 1,
  rotation: 0,
  lastX: 0,
  lastY: 0,
  offsetX: 100,
  offsetY: 150
};

let locked = false;

// apply
function updateTransform() {
  overlay.style.transform =
    `translate(${state.offsetX}px, ${state.offsetY}px)
     scale(${state.scale})
     rotate(${state.rotation}deg)`;
}

// =========================
// DRAG
// =========================
function startDrag(x, y) {
  if (locked) return;
  state.dragging = true;
  state.lastX = x;
  state.lastY = y;
}

function moveDrag(x, y) {
  if (locked) return;
  if (!state.dragging) return;

  state.offsetX += x - state.lastX;
  state.offsetY += y - state.lastY;

  state.lastX = x;
  state.lastY = y;

  updateTransform();
}

function endDrag() {
  state.dragging = false;
}

// mouse
overlay.addEventListener("mousedown", e => startDrag(e.clientX, e.clientY));
document.addEventListener("mousemove", e => moveDrag(e.clientX, e.clientY));
document.addEventListener("mouseup", endDrag);

// touch
overlay.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    startDrag(t.clientX, t.clientY);
  }
});

overlay.addEventListener("touchmove", e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    moveDrag(t.clientX, t.clientY);
  }
});

// =========================
// PINCH + ROTATION
// =========================
let initialDistance = 0;
let initialAngle = 0;
let initialScale = 1;
let initialRotation = 0;

function dist(t1,t2){
  return Math.hypot(t1.clientX-t2.clientX, t1.clientY-t2.clientY);
}

function angle(t1,t2){
  return Math.atan2(t2.clientY-t1.clientY, t2.clientX-t1.clientX) * 180 / Math.PI;
}

overlay.addEventListener("touchstart", e => {
  if (e.touches.length === 2) {
    initialDistance = dist(e.touches[0], e.touches[1]);
    initialAngle = angle(e.touches[0], e.touches[1]);
    initialScale = state.scale;
    initialRotation = state.rotation;
  }
});

overlay.addEventListener("touchmove", e => {
  if (locked) return;

  if (e.touches.length === 2) {
    const newDist = dist(e.touches[0], e.touches[1]);
    const newAngle = angle(e.touches[0], e.touches[1]);

    state.scale = initialScale * (newDist / initialDistance);
    state.rotation = initialRotation + (newAngle - initialAngle);

    updateTransform();
  }
});

overlay.addEventListener("touchend", endDrag);

// =========================
// LOCK
// =========================
document.getElementById("lockBtn").addEventListener("click", () => {
  locked = !locked;
  document.getElementById("lockBtn").innerText = locked ? "Locked" : "Lock";
});

// =========================
// GRID
// =========================
let gridOn = false;

document.getElementById("gridBtn").addEventListener("click", () => {
  gridOn = !gridOn;
  document.getElementById("grid").style.display =
    gridOn ? "block" : "none";
});

</script>

</body>
</html>
