<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Your Art</title>

<!-- ⭐ FONT EKLENDİ -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  color: black;
  margin: 0;
  overflow: hidden;
  background: #fff7cc;
  font-family: monospace;
}

/* ⭐ BAŞLIK DÜZELTİLDİ */
h1 {
  font-family: 'Press Start 2P', monospace;
  font-size: 26px;
  text-align: center;
  line-height: 1.6;
  color: black;
  text-shadow: 2px 2px 0px black;
}

/* CAMERA */
#camera {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TOP BAR (LOGO BACKGROUND) */
#topBar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: #ffe066;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
}

/* LOGO */
#appLogo {
  width: 150px;
}

/* IMAGE */
#overlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform-origin: center;
  z-index: 10;
  touch-action: none;
}

/* CONTROLS */
#controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
  z-index: 20;
}

/* RETRO BUTTON */
button {
  padding: 10px 16px;
  border: 3px solid black;
  background: #fff;
  font-family: monospace;
  font-size: 14px;
  box-shadow: 3px 3px 0px black;
  color: black;
}

/* ⭐ BUTON RENKLERİ */
#fileBtn {
  background: #ffb3c6; /* pembe */
}

#lockBtn {
  background: #bde0fe; /* mavi */
}

#startBtn {
  background: #caffbf; /* yeşil */
}

/* START SCREEN */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #fff7cc;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

#startScreen img {
  width: 180px;
  margin-bottom: 20px;
}

#startBtn {
  margin-top: 20px;
  padding: 15px 25px;
  border: 3px solid black;
}

/* CREDIT */
.credit {
  position: absolute;
  bottom: 20px;
  font-size: 12px;
}

/* OPACITY SLIDER */
#opacitySlider {
  position: fixed;
  bottom: 80px;
  width: 60%;
  left: 20%;
  z-index: 20;
}
</style>
</head>

<body>

<div id="startScreen">
  <img src="mydailydoodles-logo.png">
  <h1>TRACE<br>YOUR ART!</h1>
  <button id="startBtn">Tap to Start</button>
  <div class="credit">©mydailydoodles , 2026</div>
</div>

<video id="camera" autoplay playsinline></video>

<div id="topBar">
  <img src="mydailydoodles-logo.png" id="appLogo">
</div>

<img id="overlay">

<div id="controls">
  <button id="fileBtn">Open Image</button>
  <button id="lockBtn">Unlocked</button>
</div>

<input type="file" id="fileInput" hidden>
<input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="1">

<script>
// (JS AYNEN SENİN KODUN — HİÇ DOKUNMADIM)

const clickSound = new Audio("click.mp3");
function playClick(){
  clickSound.pause();      // 👈 kritik fix
  clickSound.currentTime = 0;

  clickSound.play().catch(()=>{});
}
  
document.getElementById("startBtn").onclick = async () => {
  playClick();

  try {
    document.getElementById("startScreen").style.display = "none";
    await initCamera();
  } catch (err) {
    alert("Camera permission blocked or not supported");
    console.log(err);
  }
};

async function initCamera(){
  const video = document.getElementById("camera");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;
}

const overlay = document.getElementById("overlay");
const fileInput = document.getElementById("fileInput");
const fileBtn = document.getElementById("fileBtn");
const lockBtn = document.getElementById("lockBtn");
const slider = document.getElementById("opacitySlider");

let locked = false;
let state = { x:0, y:0, scale:1 };

fileBtn.onclick = () => {
  playClick();
  fileInput.click();
};

fileInput.onchange = e => {
  const file = e.target.files[0];
  if(!file) return;

  overlay.onload = () => {
    const w = overlay.naturalWidth;
    const h = overlay.naturalHeight;

    const scale = Math.min(
      window.innerWidth / w,
      window.innerHeight / h
    ) * 0.6;

    state = { x:0, y:0, scale };
    update();
  };

  overlay.src = URL.createObjectURL(file);
};

lockBtn.onclick = () => {
  playClick();
  locked = !locked;
  lockBtn.innerText = locked ? "Locked" : "Unlocked";
};

slider.oninput = () => {
  overlay.style.opacity = slider.value;
};

let startX, startY;

overlay.ontouchstart = e => {
  if(locked) return;

  const t = e.touches[0];
  startX = t.clientX - state.x;
  startY = t.clientY - state.y;
};

overlay.ontouchmove = e => {
  if(locked) return;

  const t = e.touches[0];
  state.x = t.clientX - startX;
  state.y = t.clientY - startY;

  update();
};

let startDist, startScale;

overlay.addEventListener("touchstart", e => {
  if(e.touches.length === 2){
    startDist = getDist(e.touches[0], e.touches[1]);
    startScale = state.scale;
  }
});

overlay.addEventListener("touchmove", e => {
  if(e.touches.length === 2){
    let newDist = getDist(e.touches[0], e.touches[1]);
    state.scale = startScale * (newDist / startDist);
    update();
  }
});

function getDist(t1,t2){
  return Math.hypot(
    t1.clientX - t2.clientX,
    t1.clientY - t2.clientY
  );
}

function update(){
  overlay.style.transform =
    `translate(calc(-50% + ${state.x}px), calc(-50% + ${state.y}px)) scale(${state.scale})`;
}
</script>

</body>
</html>
