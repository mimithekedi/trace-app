<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

body {
  margin: 0;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
  background: #0f172a;
}

/* =========================
   START SCREEN (ONLY HERE)
========================= */

#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;

  background: radial-gradient(circle at center, #fff7c2, #fde68a);

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  z-index: 999;
  color: #1f2937;

  text-align: center;
  transition: opacity 0.6s ease;
}

/* chibi pen */
#chibiPen {
  font-size: 48px;
  margin-bottom: 15px;
  animation: floatPen 2.2s ease-in-out infinite;
}

@keyframes floatPen {
  0%   { transform: translateY(0px) rotate(-4deg); }
  50%  { transform: translateY(-6px) rotate(4deg); }
  100% { transform: translateY(0px) rotate(-4deg); }
}

/* title */
#title {
  font-size: 20px;
  margin-bottom: 10px;
}

/* tap hint */
#hint {
  font-size: 10px;
  opacity: 0.7;
  animation: floatHint 1.2s infinite alternate;
}

@keyframes floatHint {
  0% { transform: translateY(0px); opacity: 0.4; }
  100% { transform: translateY(4px); opacity: 0.9; }
}

/* credit */
#startCredit {
  position: absolute;
  bottom: 18px;
  font-size: 8px;
  opacity: 0.6;
  line-height: 1.4;
}

/* fade out */
#startScreen.hidden {
  opacity: 0;
  pointer-events: none;
}

/* =========================
   APP (TRACE MODE)
========================= */

/* camera */
#video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* overlay image */
#overlay {
  position: absolute;
  width: 300px;
  top: 150px;
  left: 100px;

  opacity: 0.5;
  touch-action: none;
}

/* grid */
#grid {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;

  background-image:
    linear-gradient(#ffffff10 1px, transparent 1px),
    linear-gradient(90deg, #ffffff10 1px, transparent 1px);

  background-size: 24px 24px;

  display: none;
}

/* =========================
   UI BUTTONS
========================= */

#buttons {
  position: fixed;
  top: 20px;
  left: 20px;

  display: flex;
  gap: 10px;
  z-index: 10;
}

button {
  font-family: 'Press Start 2P', monospace;

  font-size: 10px;
  min-width: 90px;
  height: 36px;

  border: none;
  border-radius: 12px;

  box-shadow: 0 5px 0 rgba(0,0,0,0.4);
}

#lockBtn { background:#fbcfe8; }
#gridBtn { background:#fde68a; }
#fileBtn { background:#bfdbfe; }

/* opacity */
#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;

  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);

  padding: 10px;
  border-radius: 12px;

  color: white;
  font-size: 10px;
}

/* credit */
#credit {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 8px;
  color: rgba(255,255,255,0.5);
}

</style>
</head>

<body>

<!-- 🎬 START SCREEN -->
<div id="startScreen">

  <div id="chibiPen">✏️</div>

  <div id="title">trace your art!</div>

  <div id="hint">tap to start</div>

  <div id="startCredit">
    developed by<br>
    ©mydailydoodles<br>
    2026
  </div>

</div>

<!-- TRACE APP -->
<div id="grid"></div>

<video id="video" autoplay playsinline></video>

<img id="overlay" src="" />

<div id="buttons">
  <button id="lockBtn">Lock</button>
  <button id="gridBtn">Grid</button>
  <button id="fileBtn">Load</button>
</div>

<div id="controls">
  Opacity<br><br>
  <input type="range" min="0" max="1" step="0.1" id="opacity">
</div>

<div id="credit">developed by @mydailydoodles</div>

<script>

// =========================
// START SCREEN
// =========================
const startScreen = document.getElementById("startScreen");

startScreen.addEventListener("click", () => {

  playClick();

  startScreen.classList.add("hidden");

  setTimeout(() => {
    initCamera();
  }, 400);

});

// =========================
// CLICK SOUND (placeholder)
// =========================
function playClick(){
  // later mp3 ekleriz
}

// =========================
// CAMERA
// =========================
function initCamera(){
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  }).then(stream => {
    document.getElementById("video").srcObject = stream;
  });
}

// =========================
// FILE INPUT (hidden real input)
// =========================
const file = document.createElement("input");
file.type = "file";
file.style.display = "none";
document.body.appendChild(file);

const overlay = document.getElementById("overlay");

file.addEventListener("change", e => {
  const img = e.target.files[0];
  overlay.src = URL.createObjectURL(img);
  resetOverlay();
});

document.getElementById("fileBtn").addEventListener("click", () => {
  playClick();
  file.click();
});

// =========================
// OVERLAY RESET
// =========================
function resetOverlay(){
  state.scale = 1;
  state.rotation = 0;
  state.offsetX = window.innerWidth/2 - 150;
  state.offsetY = window.innerHeight/2 - 150;
  updateTransform();
}

// =========================
// STATE
// =========================
let state = {
  dragging:false,
  scale:1,
  rotation:0,
  lastX:0,
  lastY:0,
  offsetX:100,
  offsetY:150
};

let locked=false;

// =========================
// TRANSFORM
// =========================
function updateTransform(){
  overlay.style.transform =
  `translate(${state.offsetX}px,${state.offsetY}px)
   scale(${state.scale})
   rotate(${state.rotation}deg)`;
}

// =========================
// DRAG
// =========================
function startDrag(x,y){
  if(locked) return;
  state.dragging=true;
  state.lastX=x;
  state.lastY=y;
}

function moveDrag(x,y){
  if(locked) return;
  if(!state.dragging) return;

  state.offsetX += x - state.lastX;
  state.offsetY += y - state.lastY;

  state.lastX=x;
  state.lastY=y;

  updateTransform();
}

function endDrag(){ state.dragging=false; }

// mouse
overlay.addEventListener("mousedown",e=>startDrag(e.clientX,e.clientY));
document.addEventListener("mousemove",e=>moveDrag(e.clientX,e.clientY));
document.addEventListener("mouseup",endDrag);

// touch
overlay.addEventListener("touchstart",e=>{
  if(e.touches.length===1){
    let t=e.touches[0];
    startDrag(t.clientX,t.clientY);
  }
});

overlay.addEventListener("touchmove",e=>{
  if(e.touches.length===1){
    let t=e.touches[0];
    moveDrag(t.clientX,t.clientY);
  }
});

// =========================
// LOCK
// =========================
document.getElementById("lockBtn").addEventListener("click",()=>{
  playClick();
  locked=!locked;
  document.getElementById("lockBtn").innerText = locked ? "Locked":"Lock";
});

// =========================
// GRID
// =========================
let gridOn=false;

document.getElementById("gridBtn").addEventListener("click",()=>{
  playClick();
  gridOn=!gridOn;
  document.getElementById("grid").style.display =
    gridOn ? "block":"none";
});

// =========================
// OPACITY
// =========================
document.getElementById("opacity").addEventListener("input",e=>{
  overlay.style.opacity = e.target.value;
});

</script>

</body>
</html>
