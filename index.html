<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */

body {
  margin: 0;
  overflow: hidden;
  background: #0f172a;
  font-family: 'Press Start 2P', monospace;
}

/* CAMERA */
#video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY */
#overlay {
  position: absolute;
  width: 300px;
  top: 150px;
  left: 100px;

  opacity: 0.5;
  transform-origin: center;
  touch-action: none;
}

/* =========================
   UI
========================= */

#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;

  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);

  border-radius: 14px;
  padding: 12px;

  color: white;
  font-size: 10px;
}

/* BUTTON LAYOUT */
#buttons {
  position: fixed;
  top: 20px;
  left: 20px;

  display: flex;
  gap: 10px;
}

/* BUTTON BASE */
button {
  font-family: 'Press Start 2P', monospace;

  font-size: 10px;
  line-height: 1;
  white-space: nowrap;

  min-width: 90px;
  height: 36px;

  border: none;
  border-radius: 12px;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 5px 0 rgba(0,0,0,0.4);

  transition: 0.1s;
}

button:active {
  transform: translateY(3px);
  box-shadow: 0 2px 0 rgba(0,0,0,0.4);
}

/* pastel colors */
#lockBtn { background: #fbcfe8; color: #3b0764; }
#gridBtn { background: #fde68a; color: #3b2f00; }
#fileBtn { background: #bfdbfe; color: #1e3a8a; }

/* GRID */
#grid {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;

  background-image:
    linear-gradient(#ffffff10 1px, transparent 1px),
    linear-gradient(90deg, #ffffff10 1px, transparent 1px);

  background-size: 24px 24px;

  display: none;
}

/* CREDIT */
#credit {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);

  font-size: 8px;
  color: rgba(255,255,255,0.5);
}

</style>
</head>

<body>

<div id="grid"></div>

<!-- CAMERA -->
<video id="video" autoplay playsinline></video>

<!-- OVERLAY -->
<img id="overlay" src="" />

<!-- BUTTONS -->
<div id="buttons">
  <button id="lockBtn">Lock</button>
  <button id="gridBtn">Grid</button>
  <button id="fileBtn">Load Image</button>
</div>

<!-- OPACITY -->
<div id="controls">
  Opacity<br><br>
  <input type="range" min="0" max="1" step="0.1" id="opacity">
</div>

<!-- CREDIT -->
<div id="credit">developed by @mydailydoodles</div>

<!-- 🔊 CLICK SOUND -->
<audio id="clickSound" src="click.mp3" preload="auto"></audio>

<script>

// =========================
// CLICK SOUND
// =========================
function playClick() {
  const s = document.getElementById("clickSound");
  if (!s) return;
  s.currentTime = 0;
  s.play().catch(()=>{});
}


// =========================
// CAMERA
// =========================
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream => {
  document.getElementById("video").srcObject = stream;
});


// =========================
// IMAGE
// =========================
const file = document.createElement("input");
file.type = "file";
file.style.display = "none";
document.body.appendChild(file);

const overlay = document.getElementById("overlay");

function resetOverlay() {
  state.scale = 1;
  state.rotation = 0;
  state.offsetX = window.innerWidth / 2 - 150;
  state.offsetY = window.innerHeight / 2 - 150;
  updateTransform();
}

file.addEventListener("change", e => {
  playClick();
  const img = e.target.files[0];
  overlay.src = URL.createObjectURL(img);
  resetOverlay();
});

// file button
document.getElementById("fileBtn").addEventListener("click", () => {
  playClick();
  file.click();
});


// =========================
// OPACITY
// =========================
document.getElementById("opacity").addEventListener("input", e => {
  overlay.style.opacity = e.target.value;
});


// =========================
// STATE
// =========================
let state = {
  dragging: false,
  scale: 1,
  rotation: 0,
  lastX: 0,
  lastY: 0,
  offsetX: 100,
  offsetY: 150
};

let locked = false;


// =========================
// TRANSFORM
// =========================
function updateTransform() {
  overlay.style.transform =
    `translate(${state.offsetX}px, ${state.offsetY}px)
     scale(${state.scale})
     rotate(${state.rotation}deg)`;
}


// =========================
// DRAG
// =========================
function startDrag(x,y){
  if (locked) return;
  state.dragging = true;
  state.lastX = x;
  state.lastY = y;
}

function moveDrag(x,y){
  if (locked) return;
  if (!state.dragging) return;

  state.offsetX += x - state.lastX;
  state.offsetY += y - state.lastY;

  state.lastX = x;
  state.lastY = y;

  updateTransform();
}

function endDrag(){
  state.dragging = false;
}


// mouse
overlay.addEventListener("mousedown", e => startDrag(e.clientX,e.clientY));
document.addEventListener("mousemove", e => moveDrag(e.clientX,e.clientY));
document.addEventListener("mouseup", endDrag);

// touch
overlay.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    startDrag(t.clientX,t.clientY);
  }
});

overlay.addEventListener("touchmove", e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    moveDrag(t.clientX,t.clientY);
  }
});


// =========================
// PINCH + ROTATION
// =========================
let d0=0,a0=0,s0=1,r0=0;

function dist(t1,t2){
  return Math.hypot(t1.clientX-t2.clientX, t1.clientY-t2.clientY);
}

function angle(t1,t2){
  return Math.atan2(t2.clientY-t1.clientY, t2.clientX-t1.clientX)*180/Math.PI;
}

overlay.addEventListener("touchstart", e=>{
  if (e.touches.length===2){
    d0=dist(e.touches[0],e.touches[1]);
    a0=angle(e.touches[0],e.touches[1]);
    s0=state.scale;
    r0=state.rotation;
  }
});

overlay.addEventListener("touchmove", e=>{
  if (locked) return;

  if (e.touches.length===2){
    let d=dist(e.touches[0],e.touches[1]);
    let a=angle(e.touches[0],e.touches[1]);

    state.scale = s0*(d/d0);
    state.rotation = r0+(a-a0);

    updateTransform();
  }
});

overlay.addEventListener("touchend", endDrag);


// =========================
// LOCK
// =========================
document.getElementById("lockBtn").addEventListener("click",()=>{
  playClick();
  locked = !locked;
  document.getElementById("lockBtn").innerText = locked ? "Locked" : "Lock";
});


// =========================
// GRID
// =========================
let gridOn=false;

document.getElementById("gridBtn").addEventListener("click",()=>{
  playClick();
  gridOn=!gridOn;
  document.getElementById("grid").style.display = gridOn ? "block":"none";
});

</script>

</body>
</html>
